name: Update Live Matches
on:
  schedule:
    - cron: '*/5 * * * *' # Ejecuta cada 5 minutos
  workflow_dispatch: # Permite ejecutarlo manualmente desde GitHub

jobs:
  ping_live_engine:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Prode Live Matches API
        run: curl -s https://prode-mixon.vercel.app/api/cron-live-matches
